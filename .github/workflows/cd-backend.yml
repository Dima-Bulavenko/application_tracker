name: Deploy Backend

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check for backend changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^backend/|^\.github/workflows/cd-backend\.yml'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.changes.outputs.deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.changes.outputs.deploy == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        if: steps.changes.outputs.deploy == 'true'
        id: build-image
        working-directory: ./backend
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        run: |
          IMAGE_TAG=latest
          docker build \
            --platform linux/amd64 \
            -t $ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update Lambda function to use new image
        if: steps.changes.outputs.deploy == 'true'
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --image-uri ${{ steps.build-image.outputs.image }}

      - name: Wait for Lambda update to complete
        if: steps.changes.outputs.deploy == 'true'
        run: |
          aws lambda wait function-updated --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}

      - name: Health check
        if: steps.changes.outputs.deploy == 'true'
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "${{ vars.API_URL }}/openapi.json" > /dev/null; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
