# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_install_hook_types:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^frontend/src/client/.*
      - id: end-of-file-fixer
        exclude: frontend/src/client/.*
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      # ruff linter
      - id: ruff-check
        name: ruff check
        entry: backend/.venv/bin/ruff check
        args: ['--fix']
        language: system
        types_or: [python, pyi]
      # ruff formatter
      - id: ruff-format
        name: ruff format
        entry: backend/.venv/bin/ruff format
        language: system
        types_or: [python, pyi]
      # mypy
      - id: mypy
        name: mypy
        entry: backend/.venv/bin/mypy
        args: ['--ignore-missing-imports', '--scripts-are-modules']
        require_serial: true
        language: system
        exclude: ^backend/app/tests/
        types_or: [python, pyi]
      # biome (linter + formatter)
      - id: biome-check
        name: biome check
        language: system
        entry: bash -lc 'cd frontend && ./node_modules/.bin/biome check --write .'
        files: ^frontend/
        pass_filenames: false

      # TypeScript typecheck
      - id: ts-typecheck
        name: typescript typecheck
        language: system
        # ensure deps exist, then run strict project-reference typecheck
        entry: bash -lc 'cd frontend && { [ -d node_modules ] || npm ci --no-audit --no-fund; } && ./node_modules/.bin/tsc -b --noEmit'
        files: ^frontend/
        pass_filenames: false
        require_serial: true
